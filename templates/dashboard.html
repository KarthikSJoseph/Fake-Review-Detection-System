<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Fake Review Detection</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* Optional dashboard layout improvement */
.dashboard {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}
</style>

</head>

<body>

<header>
  <div class="logo">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
  </div>
  <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
</header>

<div class="container dashboard">

  <h1>FAKE REVIEW DETECTION DASHBOARD</h1>

  <!-- INPUT SECTION -->
  <div class="card input-card" id="inputView">
    <h3>Analyze Review</h3>

    <div class="textarea-wrapper">
      <textarea id="reviewText" placeholder="Paste reviews (one per line)"></textarea>

      <div class="upload-wrapper">
        <button type="button" class="upload-icon" onclick="toggleUploadMenu()">+</button>

        <div class="upload-menu" id="uploadMenu">
          <label class="menu-item">
            Upload CSV
            <input type="file" accept=".csv" onchange="handleFileUpload(event)">
          </label>

          <label class="menu-item">
            Upload Screenshot
            <input type="file" accept="image/*" onchange="uploadImage(event)">
          </label>
        </div>
      </div>
    </div>

    <button type="button" class="analyze-btn" onclick="analyzeReviews()">
      Analyze Review
    </button>
  </div>

  <!-- RESULTS SECTION -->
  <div id="resultsView" class="hidden">
    <button class="back-btn" onclick="goBack()">← Back</button>

    <div class="results-grid">
      <canvas id="pieChart"></canvas>
      <div id="reviewList"></div>
    </div>

    <div class="stats-grid">
      <div>Total: <span id="totalCount">0</span></div>
      <div>Fake: <span id="fakeCount">0</span></div>
      <div>Genuine: <span id="genuineCount">0</span></div>
    </div>
  </div>

  <!-- SUMMARY SECTION -->
  <div class="card stats-card">
    <h3>Overall Summary</h3>

    <div class="stats-grid">
      <div class="stat-box">
        <h4>Total Reviews</h4>
        <p>{{ total_analyses }}</p>
      </div>

      <div class="stat-box fake">
        <h4>Fake Reviews</h4>
        <p>{{ total_fake }}</p>
      </div>

      <div class="stat-box genuine">
        <h4>Genuine Reviews</h4>
        <p>{{ total_genuine }}</p>
      </div>
    </div>
  </div>

  <!-- BLOCKCHAIN LINK -->
  <div style="text-align: right;">
    <a href="/blockchain_table" class="blockchain-btn">
      View Genuine Reviews
    </a>
  </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
