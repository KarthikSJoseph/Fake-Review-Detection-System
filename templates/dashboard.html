<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Review Detection</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
  <div class="logo">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
  </div>
  <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
</header>

<div class="container">

  <h1>FAKE REVIEW DETECTION</h1>

  <!-- INPUT -->
  <div class="card input-card">
    <h3>Analyze Review</h3>

    <textarea id="reviewText" placeholder="Paste reviews (one per line)"></textarea>

    <button class="analyze-btn" onclick="analyzeReviews()">
      Analyze Review
    </button>
  </div>

  <!-- RESULTS -->
  <div id="resultsView" style="display:none;">
    <h3>Results</h3>

    <canvas id="pieChart"></canvas>

    <div id="reviewList"></div>

    <div class="stats-grid">
      <div>Total: <span id="totalCount">0</span></div>
      <div>Fake: <span id="fakeCount">0</span></div>
      <div>Genuine: <span id="genuineCount">0</span></div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="card stats-card">
    <h3>Overall Summary</h3>
    <div class="stats-grid">
      <div class="stat-box">
        <h4>Total Reviews</h4>
        <p>{{ total_fake + total_genuine }}</p>
      </div>
      <div class="stat-box fake">
        <h4>Fake Reviews</h4>
        <p>{{ total_fake }}</p>
      </div>
      <div class="stat-box genuine">
        <h4>Genuine Reviews</h4>
        <p>{{ total_genuine }}</p>
      </div>
    </div>
  </div>

  <div style="text-align: right; margin-top: 10px;">
    <a href="/blockchain_table" class="blockchain-btn">
      View Genuine Reviews
    </a>
  </div>

</div>

<script>
async function analyzeReviews() {
    const text = document.getElementById("reviewText").value.trim();

    if (!text) {
        alert("Please enter at least one review");
        return;
    }

    const reviews = text.split("\n");

    let fake = 0;
    let genuine = 0;

    const reviewList = document.getElementById("reviewList");
    reviewList.innerHTML = "";

    for (let review of reviews) {
        if (!review.trim()) continue;

        try {
            const res = await fetch("/api/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: "review=" + encodeURIComponent(review)
            });

            const data = await res.json();

            const div = document.createElement("div");
            div.className = "review-item";
            div.innerHTML = `
                <p>${review}</p>
                <strong>${data.result} (${data.confidence}%)</strong>
            `;

            reviewList.appendChild(div);

            if (data.result === "Fake") fake++;
            else genuine++;

        } catch (err) {
            console.error(err);
        }
    }

    // Update stats
    document.getElementById("totalCount").innerText = fake + genuine;
    document.getElementById("fakeCount").innerText = fake;
    document.getElementById("genuineCount").innerText = genuine;

    // Show results
    document.getElementById("resultsView").style.display = "block";

    // Pie chart
    const ctx = document.getElementById("pieChart").getContext("2d");

    new Chart(ctx, {
        type: "pie",
        data: {
            labels: ["Fake", "Genuine"],
            datasets: [{
                data: [fake, genuine],
                backgroundColor: ["#ff4d4d", "#4CAF50"]
            }]
        }
    });
}
</script>

</body>
</html>
